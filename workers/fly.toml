# fly.toml app configuration for the crawl -> normalize -> dedup pipeline.
# Regenerated by `fly launch --config workers/fly.toml --no-deploy` (which
# strips comments and drops empty sections like a keyless [env] block) - no
# functional difference from the original, just less commentary. Re-added
# below.
#
# Unlike apps/api/fly.toml and apps/web/fly.toml, this app has no
# [http_service] - it's a one-shot batch job (workers/Dockerfile's CMD runs
# scripts/run_pipeline.py to completion and exits), not a standing server.
# See .github/workflows/crawl-pipeline.yml for how it's actually triggered
# on a schedule. DATABASE_URL is set via `fly secrets set`, not [env] here -
# it's a secret, not a plain env var.

app = 'german-smart-apply-workers'
primary_region = 'fra'

[build]
  # Relative to this file's own directory (workers/), NOT the repo root -
  # same "pass '.' explicitly as the build context" reasoning as
  # apps/api/fly.toml - the Dockerfile's own COPY paths are workers-root-
  # relative (see workers/Dockerfile), so no repo-root context is needed
  # here, but flyctl still wants an explicit context argument on deploy.
  dockerfile = 'Dockerfile'

[[vm]]
  # Bumped from 512mb: run_pipeline.py loads canonical_jobs' full
  # descriptions for the whole country into memory once per run in
  # near_duplicates.py (see that module's docstring - it's O(all visible
  # jobs), by design, not a bug fixed here), and that pool only grows as
  # more real jobs get crawled. 512mb was already tight for that; this is
  # a safety margin, not a substitute for bounding the query itself.
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
