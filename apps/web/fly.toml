# fly.toml app configuration file generated for german-smart-apply-web on 2026-07-11T10:59:48+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'german-smart-apply-web'
primary_region = 'fra'

[build]
  # Relative to this file's own directory (apps/web/), NOT the repo root -
  # flyctl resolves it against wherever --config points, so "apps/web/Dockerfile"
  # here doubled into apps/web/apps/web/Dockerfile. The build CONTEXT is a
  # separate thing and still needs to be the repo root - pass "." explicitly
  # on the fly deploy command (see DEPLOYMENT.md) so the Dockerfile's COPY
  # packages/shared etc. can reach the rest of the pnpm workspace.
  dockerfile = 'Dockerfile'
  # NEXT_PUBLIC_* are inlined into the client bundle by `next build` itself,
  # so they must reach the image as build args, not `[env]`/`fly secrets`
  # (both runtime-only - the image is already built by the time those apply).
  # `fly launch` regenerates this whole file and drops this block - if you
  # re-run `fly launch` on this app, restore it before deploying.
  [build.args]
    NEXT_PUBLIC_API_URL = 'https://german-smart-apply-api.fly.dev'
    NEXT_PUBLIC_USE_MOCK_API = 'false'

[env]
  PORT = '3100'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
