# fly.toml app configuration file generated for german-smart-apply-api on 2026-07-11T10:59:27+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'german-smart-apply-api'
primary_region = 'fra'

[build]
  dockerfile = 'apps/api/Dockerfile'

[env]
  PORT = '3001'
  # DATABASE_URL, JWT_SECRET, WEB_APP_URL, STRIPE_*, ANTHROPIC_API_KEY are
  # secrets, not plain env vars - set them with:
  #   fly secrets set DATABASE_URL=... JWT_SECRET=... --app german-smart-apply-api
  # Fly sets NODE_ENV=production by default, and the app fails to start under
  # NODE_ENV=production unless JWT_SECRET and all three STRIPE_* vars are set
  # (see auth.module.ts / billing.service.ts) - only ANTHROPIC_API_KEY is
  # truly optional (omitting it runs with the deterministic MockAiProvider).

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
