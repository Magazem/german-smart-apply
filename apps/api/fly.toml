# Deploy from the repo root so the Docker build context includes the pnpm
# workspace: `fly deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile .`
app = "german-smart-apply-api"
primary_region = "fra"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "3001"
  # DATABASE_URL, JWT_SECRET, WEB_APP_URL, STRIPE_*, ANTHROPIC_API_KEY are
  # secrets, not plain env vars - set them with:
  #   fly secrets set DATABASE_URL=... JWT_SECRET=... --app german-smart-apply-api
  # Leaving STRIPE_*/ANTHROPIC_API_KEY unset runs with the mock providers.

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
