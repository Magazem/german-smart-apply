name: german-smart-apply

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: german_smart_apply
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ..
      dockerfile: infra/docker/db-migrate.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/german_smart_apply?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/german_smart_apply?schema=public
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me}
      WEB_APP_URL: http://localhost:3100
      CV_UPLOAD_DIR: /app/apps/api/uploads/cv
      # All three unset here on purpose (see env.example) - BillingService
      # falls back to MockBillingProvider automatically until real keys
      # are supplied, same for AnthropicAiProvider/ANTHROPIC_API_KEY below.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - cv_uploads:/app/apps/api/uploads/cv
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_USE_MOCK_API: "false"
      PORT: "3100"
    ports:
      - "3100:3100"
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/german_smart_apply
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  cv_uploads:
