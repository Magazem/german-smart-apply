name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    concurrency: deploy-api-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # No separate --dockerfile flag: combined with --config it resolves
      # relative to the wrong base and doubles the path (flyctl#400). The
      # fly.toml's own [build] dockerfile is enough.
      - run: flyctl deploy --config apps/api/fly.toml --remote-only .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    concurrency: deploy-web-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/web/fly.toml --remote-only .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
