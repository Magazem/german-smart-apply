name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    concurrency: deploy-api-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # fly.toml's [build] dockerfile is relative to fly.toml's own
      # directory (apps/api/), not the repo root - the trailing "." here is
      # what keeps the build *context* at the repo root regardless, so the
      # Dockerfile's COPY packages/shared etc. still resolve.
      - run: flyctl deploy --config apps/api/fly.toml --remote-only .
        env:
          # `fly tokens create deploy --app <name>` is scoped to that one app
          # only (Fly's own recommended narrowest-scope default) - api and web
          # each need their own token/secret, not one shared FLY_API_TOKEN,
          # or whichever token was saved last silently deauthorizes the other job.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    concurrency: deploy-web-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/web/fly.toml --remote-only .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEB }}
