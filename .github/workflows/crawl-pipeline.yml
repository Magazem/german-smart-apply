name: Run crawl pipeline

on:
  schedule:
    # Every 4 hours - matches the finest crawlFrequencyMinutes (240) among
    # configured sources (see workers/common/market_de.py). Coarser sources
    # (360min/6h, e.g. Arbeitsagentur) just get crawled somewhat more often
    # than their nominal cadence, which is harmless: run_pipeline.py crawls
    # every active source on each invocation and every adapter/dedup step
    # is idempotent (upsert-by-originalJobId, exact/near-dup collapsing).
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

jobs:
  run-pipeline:
    name: Run crawl pipeline
    runs-on: ubuntu-latest
    concurrency: crawl-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Same "pass '.' explicitly as build context" reasoning as
      # fly-deploy.yml. This app has no [http_service] (see workers/fly.toml),
      # so `flyctl deploy` builds the image and updates the one machine
      # configured for this app, which runs workers/Dockerfile's CMD
      # (scripts/run_pipeline.py) to completion and exits - it does not keep
      # serving traffic the way apps/api and apps/web do. Deploy alone only
      # starts that machine on the very first-ever deploy (machine creation
      # implies a start); every deploy after that just updates the existing
      # (stopped) machine's image in place without restarting it - see the
      # explicit start step below, which is what actually re-triggers a run.
      # --ha=false is required here: without it, `fly deploy` provisions a
      # redundant standby machine every run (confirmed live - it never boots
      # the entrypoint, just sits stopped) which is pure clutter for a
      # one-shot batch job that reuses the same machine every 4 hours.
      - run: flyctl deploy --config workers/fly.toml --ha=false --remote-only .
        env:
          # `fly tokens create deploy --app german-smart-apply-workers` -
          # scoped to this app only, same narrowest-scope reasoning as the
          # api/web tokens in fly-deploy.yml.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKERS }}
      # `flyctl deploy` only implicitly starts a machine when it CREATES one
      # (first-ever deploy). Every run after that targets a machine that
      # already exists in `stopped` state (this app's machine always ends a
      # successful run stopped - restart policy is on-failure, and exiting 0
      # isn't a failure) - deploy just updates its image/config in place and
      # leaves it stopped. Confirmed live: 6 straight scheduled deploys after
      # the first all showed "success" in Actions while the machine's own
      # event log went straight from created -> stopped with no intervening
      # started state, and zero pipeline log lines - the job list silently
      # stopped updating after the very first run. Explicitly starting the
      # machine here is what actually re-triggers workers/Dockerfile's CMD.
      #
      # Only the primary machine is started, not every machine id, in case
      # the redundant standby machine (see fly.toml's comment - --ha=false
      # doesn't retroactively remove one that already exists) is still
      # around: starting it too would run the pipeline twice concurrently
      # against the same DB. A machine's `config.standbys` lists the id(s)
      # it is standing by *for* (confirmed against `flyctl machine list`'s
      # own †-marked "Standby machine" column - the machine with no
      # standbys field of its own is the one marked standby; the id that
      # shows up *inside* another machine's standbys array is the primary),
      # so the primary is whatever id appears inside any machine's
      # standbys array - not the machine lacking one.
      - name: Start the machine (deploy alone doesn't restart an already-stopped one)
        run: |
          set -euo pipefail
          MACHINES=$(flyctl machine list --app german-smart-apply-workers --json)
          MACHINE_COUNT=$(echo "$MACHINES" | jq -r 'length')
          PRIMARY_ID=$(echo "$MACHINES" | jq -r '
            [.[].config.standbys[]?] | unique | .[0] // empty
          ')
          if [ -z "$PRIMARY_ID" ] && [ "$MACHINE_COUNT" -eq 1 ]; then
            # No HA standby link exists - only safe to assume "the one
            # machine" is the primary when there IS only one. If a standby
            # link is ever detached without also destroying the redundant
            # machine, MACHINE_COUNT stays 2+ here and this fallback must
            # NOT fire - guessing .[0] in that ambiguous state is exactly
            # the kind of silent-wrong-guess this whole workflow fix exists
            # to eliminate; the guard below fails loudly instead.
            PRIMARY_ID=$(echo "$MACHINES" | jq -r '.[0].id // empty')
          fi
          if [ -z "$PRIMARY_ID" ]; then
            echo "::error::Could not identify a single unambiguous machine to start ($MACHINE_COUNT machine(s) found, none standby-linked) - check 'flyctl machine list --app german-smart-apply-workers' and either destroy the redundant machine or confirm the standby link"
            exit 1
          fi
          flyctl machine start "$PRIMARY_ID" --app german-smart-apply-workers
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKERS }}
